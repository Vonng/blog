{{ define "main" }}
  <style>
    :root {
      --dossier-paper: #fffdf8;
      --dossier-paper-soft: #f7f3ea;
      --dossier-ink: #1b1a18;
      --dossier-muted: #68645e;
      --dossier-rule: #c9c1b5;
      --dossier-accent: #8f2424;
      --dossier-accent-dark: #6e1b1b;
    }

    .dossier {
      margin: 3.5rem auto 5rem;
      width: min(100%, 1040px);
      color: var(--dossier-ink);
      font-family: Georgia, "Times New Roman", "Noto Serif CJK SC", "Songti SC", serif;
      font-size: clamp(1rem, 0.95rem + 0.22vw, 1.14rem);
      line-height: 1.55;
    }

    .dossier-sheet {
      position: relative;
      overflow: hidden;
      margin: 0 auto 2.5rem;
      padding: clamp(2rem, 4.5vw, 4rem);
      background:
        linear-gradient(90deg, rgba(143, 36, 36, 0.045), transparent 18rem),
        var(--dossier-paper);
      border: 1px solid rgba(80, 72, 62, 0.18);
      border-radius: 8px;
      box-shadow: 0 22px 70px rgba(0, 0, 0, 0.22);
    }

    .dossier-sheet-primary {
      padding-bottom: clamp(2rem, 4vw, 3.5rem);
    }

    .dossier-topline,
    .dossier-page-footer {
      display: flex;
      justify-content: space-between;
      gap: 1rem;
      color: var(--dossier-muted);
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace;
      font-size: 0.82rem;
      letter-spacing: 0;
    }

    .dossier-topline {
      margin-bottom: 1.35rem;
    }

    .dossier-hero,
    .dossier-continuation {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: clamp(1rem, 4vw, 2.5rem);
      align-items: end;
      padding-bottom: 1.1rem;
      border-bottom: 4px solid var(--dossier-ink);
    }

    .dossier-hero h1,
    .dossier-continuation h2 {
      margin: 0;
      color: var(--dossier-ink);
      font-family: Georgia, "Times New Roman", "Noto Serif CJK SC", "Songti SC", serif;
      font-size: clamp(2.1rem, 1.25rem + 1.8vw, 3.05rem);
      font-weight: 800;
      line-height: 0.98;
      letter-spacing: 0;
    }

    .dossier-continuation h2 {
      font-size: clamp(1.8rem, 1.15rem + 2vw, 2.7rem);
    }

    .dossier-hero p,
    .dossier-continuation p {
      margin: 0.7rem 0 0;
      color: var(--dossier-muted);
      font-size: clamp(1rem, 0.9rem + 0.35vw, 1.3rem);
      font-style: italic;
      line-height: 1.25;
    }

    .dossier-hero aside,
    .dossier-continuation > a {
      color: var(--dossier-muted);
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace;
      font-size: clamp(0.86rem, 0.78rem + 0.25vw, 1.04rem);
      line-height: 1.35;
      text-align: right;
    }

    .dossier-hero aside span,
    .dossier-hero aside strong,
    .dossier-hero aside a,
    .dossier-hero aside time {
      display: block;
    }

    .dossier-hero aside span {
      text-transform: uppercase;
      letter-spacing: 0.16em;
    }

    .dossier-hero aside strong {
      color: var(--dossier-ink);
    }

    .dossier a {
      color: var(--dossier-accent-dark);
      text-decoration: underline;
      text-decoration-style: dotted;
      text-decoration-thickness: 0.08em;
      text-underline-offset: 0.14em;
    }

    .dossier a:hover {
      color: var(--dossier-accent);
      text-decoration-style: solid;
    }

    .dossier-meta {
      display: grid;
      grid-template-columns: minmax(0, 1.25fr) minmax(0, 1.25fr) minmax(0, 1fr);
      gap: 1rem 2.5rem;
      margin: 1.35rem 0 1.45rem;
      padding-bottom: 1.2rem;
      border-bottom: 1px solid var(--dossier-rule);
    }

    .dossier-meta div {
      min-width: 0;
    }

    .dossier-meta dt {
      margin-bottom: 0.25rem;
      color: var(--dossier-muted);
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace;
      font-size: 0.82rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }

    .dossier-meta dd {
      margin: 0;
      font-weight: 650;
      line-height: 1.35;
    }

    .dossier-lede {
      margin: 0 0 1.6rem;
      padding: 1.1rem 1.3rem;
      border-top: 1px solid var(--dossier-rule);
      border-bottom: 1px solid var(--dossier-rule);
      color: var(--dossier-ink);
      font-size: clamp(1.05rem, 0.95rem + 0.38vw, 1.42rem);
      line-height: 1.55;
    }

    .dossier-lede em {
      color: var(--dossier-accent);
    }

    .dossier-section {
      margin-top: 1.35rem;
    }

    .dossier-section h2 {
      display: flex;
      flex-wrap: wrap;
      align-items: baseline;
      gap: 0.6rem 1.25rem;
      margin: 0 0 0.65rem;
      color: var(--dossier-accent);
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace;
      font-size: clamp(1.35rem, 1.05rem + 1vw, 2rem);
      font-weight: 800;
      line-height: 1.1;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .dossier-section h2 em {
      color: var(--dossier-muted);
      font-family: Georgia, "Times New Roman", "Noto Serif CJK SC", "Songti SC", serif;
      font-size: 0.62em;
      font-weight: 400;
      letter-spacing: 0;
      text-transform: none;
    }

    .dossier-entry {
      margin: 0.75rem 0 0;
    }

    .dossier-entry h3 {
      margin: 0 0 0.25rem;
      color: var(--dossier-ink);
      font-size: 1.03em;
      font-style: italic;
      font-weight: 800;
      line-height: 1.25;
    }

    .dossier p {
      margin: 0.55rem 0;
    }

    .dossier ul {
      margin: 0.45rem 0 0;
      padding-left: 1.35rem;
    }

    .dossier li {
      margin: 0.28rem 0;
      padding-left: 0.2rem;
    }

    .dossier-stats {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 1rem;
      margin: 0.75rem 0 0.9rem;
      padding: 0.6rem 0 0.6rem 1rem;
      border-left: 5px solid var(--dossier-accent);
    }

    .dossier-stats strong,
    .dossier-stats span {
      display: block;
    }

    .dossier-stats strong {
      color: var(--dossier-ink);
      font-size: clamp(1.45rem, 1rem + 1.5vw, 2.35rem);
      line-height: 1;
    }

    .dossier-stats span {
      margin-top: 0.35rem;
      color: var(--dossier-muted);
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace;
      font-size: 0.75rem;
      letter-spacing: 0.13em;
      line-height: 1.35;
      text-transform: uppercase;
    }

    .dossier blockquote {
      margin: 0.7rem 0 0;
      padding: 0.15rem 0 0.15rem 1rem;
      border-left: 4px solid var(--dossier-rule);
      color: var(--dossier-muted);
      font-style: italic;
    }

    .dossier-assessment,
    .dossier-verification {
      margin-top: 1.55rem;
    }

    .dossier-page-footer {
      margin-top: 2rem;
      padding-top: 0.75rem;
      border-top: 1px solid var(--dossier-rule);
    }

    @media (max-width: 820px) {
      .dossier {
        margin-top: 2rem;
        font-size: 1rem;
      }

      .dossier-sheet {
        padding: 1.5rem;
      }

      .dossier-topline {
        display: none;
      }

      .dossier-hero,
      .dossier-continuation {
        grid-template-columns: 1fr;
        gap: 0.9rem;
      }

      .dossier-hero aside,
      .dossier-continuation > a {
        text-align: left;
      }

      .dossier-meta {
        grid-template-columns: 1fr;
        gap: 0.85rem;
      }

      .dossier-lede {
        padding: 1rem 0;
        font-size: 1.05rem;
      }

      .dossier-stats {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 520px) {
      .dossier-sheet {
        margin-right: -0.5rem;
        margin-left: -0.5rem;
        padding: 1.15rem;
        border-radius: 0;
      }

      .dossier-hero h1 {
        font-size: 2.2rem;
      }

      .dossier-section h2 {
        font-size: 1.25rem;
      }

      .dossier-stats {
        grid-template-columns: 1fr;
      }

      .dossier-page-footer {
        flex-direction: column;
        gap: 0.2rem;
      }
    }

    @media print {
      body {
        background: #fff !important;
      }

      .dossier {
        margin: 0;
        width: 100%;
        font-size: 10.4pt;
      }

      .dossier-sheet {
        min-height: 297mm;
        margin: 0;
        padding: 14mm 15mm;
        border: 0;
        border-radius: 0;
        box-shadow: none;
        break-after: page;
      }

      .dossier-sheet:last-child {
        break-after: auto;
      }

      .dossier a {
        color: var(--dossier-accent-dark);
      }
    }
  </style>
  {{ .RawContent | safeHTML }}
{{ end }}
