<style>
  :root {
    --pg: #336791;
    --deep: #234a6b;
    --navy: #16334c;
    --sky: #a8c8de;
    --ice: #ddeaf4;
    --pale: #f0f6fa;
    --paper: #fafcfe;
    --body: #25394c;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; min-height: 100vh;
    display: grid; place-items: center;
    background: #cfdde8;
    font-family: "Archivo", "Noto Sans SC", "PingFang SC", sans-serif;
  }
  .stage { padding: 40px; display: grid; place-items: center; min-height: 100vh; width: 100%; }
  .card {
    position: relative;
    width: 90mm; height: 54mm;
    background: var(--paper);
    color: var(--body);
    box-shadow: 0 18px 50px rgba(22,51,76,.28);
    overflow: hidden;
  }
  /* ── 结构线 ── */
  .axis-v { position: absolute; left: 56mm; top: 0; bottom: 0; width: 0.55mm; background: var(--navy); }
  .axis-h { position: absolute; left: 0; right: 0; top: 26mm; height: 0.55mm; background: var(--navy); }
  /* ── 右上象限：淡蓝底 + 几何 + 内嵌矢量二维码 ── */
  .qzone {
    position: absolute; left: 56.55mm; right: 0; top: 0; height: 26mm;
    background: var(--pale);
    overflow: hidden;
  }
  .qzone::before {
    content: "";
    position: absolute; right: -13mm; top: -13mm;
    width: 30mm; height: 30mm;
    border-radius: 50%;
    background: var(--ice);
  }
  .qzone::after {
    content: "";
    position: absolute; left: 3.4mm; top: 0;
    width: 5.2mm; height: 2.6mm;
    border-radius: 0 0 5.2mm 5.2mm;
    background: var(--pg);
  }
  .qr-svg {
    position: absolute; left: 50%; top: 50%;
    transform: translate(-50%, -50%);
    width: 18mm; height: 18mm;
    color: var(--pg);
  }
  /* ── 左上 · 姓名 ── */
  .name-zone { position: absolute; left: 5mm; top: 6mm; width: 48mm; }
  .name-cn {
    margin: 0;
    font-family: "Noto Sans SC", sans-serif;
    font-size: 10.4mm; font-weight: 900;
    line-height: 1; letter-spacing: 0.07em;
    color: var(--navy);
  }
  .name-en {
    display: inline-block; margin-top: 1.8mm;
    font-size: 2.7mm; font-weight: 800;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--paper);
    background: var(--pg);
    padding: 0.6mm 2mm;
  }
  /* ── 左下 · 联系方式（图标 4×2） ── */
  .contacts {
    position: absolute; left: 5mm; top: 29.6mm; bottom: 4.8mm; width: 48.5mm;
    display: grid;
    grid-template-columns: minmax(0, 1.12fr) minmax(0, 1fr);
    column-gap: 2.8mm;
    align-content: space-between;
    font-size: 2.0mm;
  }
  .cell {
    display: flex; align-items: center; gap: 1.5mm;
    height: 2.8mm;
    min-width: 0;
    font-weight: 700;
    font-variant-numeric: tabular-nums;
    white-space: nowrap;
    color: var(--body);
  }
  .cell a { color: inherit; text-decoration: none; }
  .cell a:hover { color: var(--pg); }
  .ic { width: 2.6mm; height: 2.6mm; flex: none; color: var(--pg); }
  /* ── 右下 · 深蓝块 · 身份标签 ── */
  .tags {
    position: absolute; left: 56.55mm; right: 0; top: 26.55mm; bottom: 0;
    background: var(--deep);
    background-image:
      radial-gradient(circle at 90% 115%, rgba(168,200,222,.26) 0 6.5mm, transparent 6.7mm),
      radial-gradient(circle at 90% 115%, rgba(168,200,222,.16) 0 10mm, transparent 10.2mm);
    color: #eaf2f8;
    /* 内容区与左栏完全同高：29.6mm → 49.2mm，四行逐行对齐 */
    padding: 3.05mm 3.2mm 4.8mm;
    display: flex; flex-direction: column;
    justify-content: space-between;
  }
  .tag {
    display: flex; align-items: center; gap: 1.7mm;
    height: 2.8mm;
    font-size: 2.12mm; font-weight: 800;
    letter-spacing: 0.04em;
    color: #fff;
    text-decoration: none;
    white-space: nowrap;
  }
  .tag::before {
    content: "";
    width: 1.3mm; height: 1.3mm; flex: none;
    background: var(--sky);
  }
  .tag:nth-child(even)::before { background: var(--pg); }
  a.tag:hover { color: var(--sky); }
  @media print {
    @page { size: 90mm 54mm; margin: 0; }
    body, .stage { display: block; padding: 0; background: #fff; width: 90mm; }
    .card { box-shadow: none; }
  }
</style>
