<style>
:root {
  --bg:#f6f7fb;

*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--ink);font:13px/1.35 Inter,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif}
.page{max-width:1600px;margin:0 auto;padding:18px 22px 24px}
h1{margin:0 0 14px;font-size:42px;line-height:1;font-weight:850;letter-spacing:0}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.panel{background:var(--panel);border:1px solid var(--line);border-radius:10px;overflow:hidden;box-shadow:0 1px 2px rgba(16,24,40,.04)}
.head{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;padding:13px 15px 10px;border-bottom:1px solid #edf1f6}
h2{margin:0;font-size:18px;line-height:1.12;font-weight:760;letter-spacing:0}
.legend{display:flex;gap:12px;align-items:center;flex-wrap:wrap;color:#475467;font-size:12px;white-space:nowrap}
.legend span{display:inline-flex;gap:6px;align-items:center}
.dot{width:10px;height:10px;border-radius:3px;display:inline-block}
.chart{height:clamp(230px,32vh,318px);padding:8px 10px 10px}
svg{display:block;width:100%;height:100%}
.axis{fill:#667085;font-size:11px}
.gridline{stroke:#e7edf4;stroke-width:1}
.axisline{stroke:#98a2b3;stroke-width:1}
@media(max-width:760px){
  h1{font-size:30px}
  h2{font-size:15px}
  .page{padding:12px 10px 16px}
  .head{padding:10px 10px 8px}
  .legend{font-size:10px;gap:7px}
  .chart{height:230px;padding:6px 7px 8px}
}

body{background:transparent;overflow:hidden;font-size:11px}
.page{max-width:none;width:100vw;height:100vh;margin:0;padding:0}
h1{display:none}
.grid{height:100%;grid-template-columns:1fr 1fr;gap:8px}
.panel{border-radius:6px;box-shadow:none;display:grid;grid-template-rows:auto minmax(0,1fr);min-height:0}
.head{padding:7px 10px 5px;align-items:center}
h2{font-size:13px;line-height:1.05}
.legend{font-size:9px;gap:7px}
.legend span{gap:4px}
.dot{width:8px;height:8px;border-radius:2px}
.chart{height:100%;min-height:0;padding:4px 6px 6px}
.axis{font-size:9px}

</style>
</head>

function compact(v){let n=Math.abs(num(v)),s=num(v)<0?"-":"";if(n>=1e9)return s+(n/1e9).toFixed(1)+"B";if(n>=1e6)return s+(n/1e6).toFixed(1)+"M";if(n>=1e3)return s+(n/1e3).toFixed(1)+"k";return s+Math.round(n)}
function niceMax(v){if(!v||v<=0)return 1;const e=Math.pow(10,Math.floor(Math.log10(v)));const f=v/e;for(const s of [1,1.5,2,2.5,5,7.5,10])if(f<=s)return s*e;return 10*e}
function esc(s){return String(s??"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#039;"}[c]))}
function legend(id,items){document.getElementById(id).innerHTML=items.map(it=>`<span><i class="dot" style="background:${it.color}"></i>${esc(it.name)}</span>`).join("")}
function barChart(id,rows,series,opt={}){
  const el=document.getElementById(id), w=720, h=300, p={l:62,r:16,t:16,b:38}, stacked=!!opt.stacked;
  const xKey=opt.x||"month";
  const maxV=niceMax(Math.max(...rows.map(r=>stacked?series.reduce((s,it)=>s+num(r[it.field]),0):Math.max(...series.map(it=>num(r[it.field]))))));
  const band=(w-p.l-p.r)/rows.length, y=v=>h-p.b-(h-p.t-p.b)*num(v)/maxV;
  let out=[`<svg viewBox="0 0 ${w} ${h}" role="img">`];
  for(let i=0;i<=5;i++){const tick=maxV*i/5,yy=y(tick);out.push(`<line class="gridline" x1="${p.l}" x2="${w-p.r}" y1="${yy}" y2="${yy}"/><text class="axis" x="${p.l-8}" y="${yy+4}" text-anchor="end">${compact(tick)}</text>`)}
  rows.forEach((r,i)=>{const cx=p.l+band*i+band/2;if(i===0||i===rows.length-1||i%Math.ceil(rows.length/7)===0)out.push(`<text class="axis" x="${cx}" y="${h-13}" text-anchor="middle">${esc(String(r[xKey]).slice(2))}</text>`);let base=0;series.forEach((s,si)=>{const v=num(r[s.field]),yy=y(base+v),y0=y(base);const minW=rows.length>160?.8:5;const maxW=rows.length>160?2:20;const bw=Math.max(minW,Math.min(maxW,band*.72));const x0=stacked?cx-bw/2:cx-(bw*series.length)/2+si*bw;out.push(`<rect x="${x0.toFixed(2)}" y="${yy.toFixed(2)}" width="${Math.max(.6,bw-1).toFixed(2)}" height="${Math.max(0,y0-yy).toFixed(2)}" rx="${rows.length>160?0:3}" fill="${s.color}"><title>${esc(r[xKey]+" "+s.name+": "+fmt(v))}</title></rect>`);if(stacked)base+=v})})
  out.push(`<line class="axisline" x1="${p.l}" x2="${w-p.r}" y1="${h-p.b}" y2="${h-p.b}"/></svg>`);el.innerHTML=out.join("");
}
const repos=[{field:"cc",name:"repo.pigsty.cc",color:colors.cc},{field:"io",name:"repo.pigsty.io",color:colors.io}];
const cumRepos=[{field:"cumCc",name:"repo.pigsty.cc",color:colors.cc},{field:"cumIo",name:"repo.pigsty.io",color:colors.io}];
legend("dailyLegend",repos);
legend("cumLegend",cumRepos);
legend("monthlyLegend",repos);
legend("cumMonthlyLegend",cumRepos);
barChart("dailyChart",DATA.daily,repos,{stacked:true,x:"day"});
barChart("cumChart",DATA.daily,cumRepos,{stacked:true,x:"day"});
barChart("monthlyChart",DATA.monthly,repos,{stacked:true,x:"month"});
barChart("cumMonthlyChart",DATA.monthly,cumRepos,{stacked:true,x:"month"});
</script>
